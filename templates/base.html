<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Football analytics dashboard for match prediction, passing networks, and YOLO video analysis.">
    <title>{% block title %}SportStats{% endblock %}</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.svg') }}" type="image/svg+xml">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="{{ url_for('index') }}">SportStats</a>
      <nav class="nav" aria-label="Primary navigation">
        <a href="{{ url_for('predictor') }}">Predictor</a>
        <a href="{{ url_for('passing_network') }}">Passing Network</a>
        <a href="{{ url_for('vision') }}">YOLO Vision</a>
        <a href="{{ url_for('architecture') }}">Architecture</a>
      </nav>
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
