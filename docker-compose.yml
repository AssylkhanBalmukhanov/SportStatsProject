services:
  web:
    build:
      context: .
      args:
        INSTALL_VISION: ${INSTALL_VISION:-false}
    ports:
      - "5000:5000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-dev-only-change-me}
      YOLO_MODEL_PATH: ${YOLO_MODEL_PATH:-models/best.pt}
      ALLOW_PRETRAINED_YOLO: ${ALLOW_PRETRAINED_YOLO:-0}
      VISION_MAX_FRAMES: ${VISION_MAX_FRAMES:-0}
      VISION_USE_STUBS: ${VISION_USE_STUBS:-1}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./static/uploads:/app/static/uploads
      - ./static/outputs:/app/static/outputs
      - ./football_analysis/stubs:/app/football_analysis/stubs
      - ./models:/app/models:ro
